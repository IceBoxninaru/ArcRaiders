services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: arcraiders-web:latest
    container_name: arcraiders-web
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - '${APP_PORT:-80}:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/api/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
