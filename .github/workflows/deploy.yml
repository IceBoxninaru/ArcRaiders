name: build-and-deploy-ec2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Docker image
        run: docker build -t arcraiders:test .

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR=/opt/arcraiders-live
            TMP_DIR="$(mktemp -d)"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER":"$USER" "$APP_DIR"
            sudo chmod -R u+rwX "$APP_DIR"
            test -f "$APP_DIR/.env.production"
            git clone --depth 1 https://github.com/${{ github.repository }} "$TMP_DIR"
            rsync -a --delete --exclude ".git" --exclude ".env.production" "$TMP_DIR"/ "$APP_DIR"/
            rm -rf "$TMP_DIR"
            cd "$APP_DIR"
            sudo docker compose up -d --build --remove-orphans
            curl --fail http://localhost/api/health
