name: build-and-deploy-ec2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Docker image
        run: docker build -t arcraiders:test .

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            sudo mkdir -p /opt/arcraiders
            sudo chown -R "$USER":"$USER" /opt/arcraiders
            if [ ! -d /opt/arcraiders/.git ]; then
              git clone https://github.com/${{ github.repository }} /opt/arcraiders
            fi
            cd /opt/arcraiders
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            test -f .env.production
            sudo docker compose up -d --build --remove-orphans
            curl --fail http://localhost/api/health
